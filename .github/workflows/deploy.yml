name: Deploy to AWS EC2

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to EC2
      env:
        EC2_IP: ${{ secrets.EC2_INSTANCE_IP }}
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts

        ssh -i ~/.ssh/id_rsa $EC2_USER@$EC2_IP << 'EOF'
        cd /var/www/job-applily
        
        # Fix git ownership
        git config --global --add safe.directory /var/www/job-applily
        
        # Reset local changes aur pull fresh
        git fetch origin master
        git reset --hard origin/master
        
        # Fix permissions first
        sudo chown -R ubuntu:ubuntu /var/www/job-applily
        sudo chmod -R 755 /var/www/job-applily
        
        # Install dependencies
        composer install --no-dev
        
        # Clear cache
        php artisan config:clear
        php artisan cache:clear
        
        # Migrate database
        php artisan migrate --force
        
        # Fix permissions for www-data
        sudo chown -R www-data:www-data /var/www/job-applily
        sudo chmod -R 775 /var/www/job-applily/storage
        sudo chmod -R 775 /var/www/job-applily/bootstrap/cache
        
        # Restart Apache
        sudo systemctl restart apache2
        EOF
